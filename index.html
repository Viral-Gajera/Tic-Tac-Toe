<!DOCTYPE html>

<html>

   <head>
        <link rel="stylesheet" href="style.css">      
   </head>

   <body>

    <section class="setting">

        <section class="player-count">

            <p>Select Number of player</p>

            <label class="label" for="l1">
                <input type="radio" value="1" name="radio" id="l1"> 1 player
            </label>
            <label class="label" for="l2">
                <input type="radio" value="2" name="radio" id="l2"> 2 player
            </label>

        </section>
        
        <section class="select-player">
            <p>Select which player you want to be?</p>

            <div>
                player 1 :
                <label class="label" for="player-1-X">
                    <input type="radio" name="player-1" id="player-1-X">X
                </label>
                <label class="label" for="player-1-O">
                    <input type="radio" name="player-1" id="player-1-O">O
                </label>
            </div>
            <div>
                <p>player 2 :</p>
                <label class="label" for="player-2-X">
                    <input type="radio" name="player-2" id="player-2-X">X
                </label>
                <label class="label" for="player-2-O">
                    <input type="radio" name="player-2" id="player-2-O">O
                </label>
            </div>
 


        </section>
    </section>

    <section class="play">
        
    </section>

    <script src="./script.js"></script>
   </body>

</html>
